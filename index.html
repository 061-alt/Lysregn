<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumi Walk | Nordic Adventure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --nordic-bg: #FDFBF7;
            --nordic-sage: #87A96B;
            --nordic-icy: #C4D4D1;
            --nordic-clay: #BC8F8F;
            --nordic-charcoal: #2A2A2A;
            --nordic-midnight: #1A1C22;
        }
        
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--nordic-bg);
            color: var(--nordic-charcoal);
            transition: background-color 1s ease, color 1s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Weather Overlays --- */
        #weather-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9000;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #weather-layer.active { opacity: 1; }

        .rain-line {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.2);
            width: 1px;
            height: 40px;
            animation: rain-fall 0.6s linear infinite;
        }
        @keyframes rain-fall { to { transform: translateY(100vh); } }

        .snow-circle {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: snow-float 10s linear infinite;
        }
        @keyframes snow-float {
            0% { transform: translateY(-10vh) translateX(0); }
            100% { transform: translateY(100vh) translateX(50px); }
        }

        /* --- Modes --- */
        body.midnight-mode { background-color: var(--nordic-midnight) !important; color: #E0E0E0 !important; }
        body.rain-mode { background-color: #3D3D3D !important; color: #FDFBF7 !important; }
        body.snow-mode { background-color: #E0F7FA !important; color: #006064 !important; }
        body.collapse-mode { background-color: #2B1D1D !important; color: #D4A373 !important; }

        .card-bg {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 2.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.6s ease;
        }
        .midnight-mode .card-bg, .rain-mode .card-bg, .collapse-mode .card-bg { 
            background-color: rgba(30, 30, 30, 0.8); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        #map-wrapper {
            width: 100%; height: 42vh; border-radius: 2.5rem; overflow: hidden;
            position: relative; border: 6px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            z-index: 10;
        }
        #map { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nordic-art { width: 100%; height: auto; max-width: 240px; margin: 0 auto; }
        
        .glitch { animation: glitch-anim 0.3s infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="pb-32">

    <!-- 天気レイヤー (クリック透過) -->
    <div id="weather-layer"></div>

    <!-- 起動オーバーレイ -->
    <div id="geo-overlay" class="fixed inset-0 z-[10000] bg-[#1A1C22] flex flex-col items-center justify-center p-10 text-white text-center">
        <div class="relative mb-8">
            <i data-lucide="wind" class="w-16 h-16 animate-pulse text-[#C4D4D1]"></i>
            <i data-lucide="navigation" class="absolute -bottom-2 -right-2 w-8 h-8 text-[#BC8F8F]"></i>
        </div>
        <h2 class="text-2xl font-light tracking-widest mb-2 uppercase">Lumi Walk</h2>
        <p id="geo-status" class="text-sm opacity-40 mb-10">北欧の風を待っています...</p>
        
        <button id="fallback-btn" class="hidden px-8 py-4 border border-white/20 rounded-full text-xs tracking-widest hover:bg-white hover:text-black transition-all">
            位置情報の取得を待たずに始める
        </button>
    </div>

    <!-- ナビゲーションカード -->
    <div id="nav-step-card" class="fixed top-4 left-4 right-4 p-6 rounded-[2.5rem] shadow-2xl flex items-center gap-5 bg-white card-bg transition-transform duration-700 -translate-y-[150%] z-[5000]">
        <div id="nav-arrow-box" class="w-16 h-16 rounded-3xl bg-[#87A96B] text-white flex items-center justify-center shadow-lg">
            <i data-lucide="arrow-up" id="nav-arrow-icon" size="32"></i>
        </div>
        <div class="flex-1">
            <div class="flex items-baseline gap-1">
                <span id="nav-dist" class="text-3xl font-bold tracking-tighter">---</span>
                <span class="text-xs font-bold opacity-40">m</span>
            </div>
            <p id="nav-instruction" class="text-xs font-bold opacity-60 tracking-tight">目的地へ向かいます</p>
        </div>
        <button onclick="stopNavigation()" class="opacity-20 hover:opacity-100 transition-opacity"><i data-lucide="x-circle"></i></button>
    </div>

    <!-- ヘッダー -->
    <header class="p-6 flex justify-between items-center sticky top-0 z-[4000] backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div id="header-icon" class="w-10 h-10 bg-black/5 rounded-full flex items-center justify-center">
                <i data-lucide="mountain" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-lg font-semibold tracking-tighter">Lumi Walk</h1>
                <p id="mode-label" class="text-[9px] uppercase tracking-[0.2em] opacity-40">Spring Palette</p>
            </div>
        </div>
        
        <div class="flex items-center gap-1 bg-black/5 p-1 rounded-2xl">
            <button onclick="setWeather('default')" class="p-2 opacity-30 hover:opacity-100" id="btn-sun"><i data-lucide="sun" size="16"></i></button>
            <button onclick="setWeather('rain')" class="p-2 opacity-30 hover:opacity-100" id="btn-rain"><i data-lucide="cloud-rain" size="16"></i></button>
            <button onclick="setWeather('snow')" class="p-2 opacity-30 hover:opacity-100" id="btn-snow"><i data-lucide="snowflake" size="16"></i></button>
            <button id="skull-btn" class="p-2 opacity-10 ml-2"><i data-lucide="skull" size="16"></i></button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 space-y-8">
        
        <!-- アートワークエリア -->
        <div id="artwork-container" class="py-4 flex flex-col items-center">
            <div id="artwork-svg" class="nordic-art"></div>
            <p id="artwork-label" class="text-[9px] font-bold tracking-[0.3em] opacity-30 uppercase mt-4"></p>
        </div>

        <!-- タブ: プランナー -->
        <section id="tab-planner" class="tab-content active space-y-6">
            <div id="map-wrapper"><div id="map"></div></div>
            
            <div class="p-8 card-bg space-y-8">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-2xl bg-[#87A96B]/10 text-[#87A96B] flex items-center justify-center">
                            <i data-lucide="clock" size="20"></i>
                        </div>
                        <h2 class="text-sm font-bold tracking-widest">TIME</h2>
                    </div>
                    <span class="text-2xl font-semibold" id="time-display">30 min</span>
                </div>
                <input type="range" min="30" max="120" step="15" value="30" id="time-range" class="w-full accent-[#87A96B]">
                
                <div class="pt-6 border-t border-black/5 flex justify-between items-center">
                    <div class="space-y-1">
                        <h3 id="route-name" class="text-lg font-bold tracking-tighter">Loop Route</h3>
                        <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">周辺を巡るコースを作成</p>
                    </div>
                    <button onclick="startFullRoute()" class="w-16 h-16 rounded-[2rem] bg-nordic-charcoal text-white shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
                        <i data-lucide="play" fill="white" size="28" class="ml-1"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- タブ: 記録 -->
        <section id="tab-record" class="tab-content space-y-6">
            <div class="p-8 card-bg flex items-center gap-8">
                <div id="cat-avatar" class="w-24 h-24 rounded-full bg-nordic-charcoal flex items-center justify-center text-white relative">
                    <!-- Black Cat SVG -->
                    <svg viewBox="0 0 100 100" class="w-16 h-16 fill-current">
                        <circle cx="50" cy="65" r="30"/>
                        <circle cx="50" cy="35" r="20"/>
                        <path d="M35 25 L30 5 L45 20 Z"/>
                        <path d="M65 25 L70 5 L55 20 Z"/>
                        <circle cx="42" cy="35" r="2" fill="#FDFBF7"/>
                        <circle cx="58" cy="35" r="2" fill="#FDFBF7"/>
                    </svg>
                    <div id="cat-heart" class="hidden absolute -top-2 -right-2 text-red-400 animate-pulse"><i data-lucide="heart" fill="currentColor"></i></div>
                </div>
                <div class="flex-1 space-y-3">
                    <h3 class="text-xl font-bold tracking-tighter" id="cat-status">Shadow Companion</h3>
                    <div class="flex justify-between text-[10px] font-bold opacity-40 uppercase tracking-widest">
                        <span>Total Distance</span>
                        <span id="total-dist">0.0 km</span>
                    </div>
                    <div class="h-1.5 w-full bg-black/5 rounded-full overflow-hidden">
                        <div id="cat-gauge" class="h-full bg-nordic-sage transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ボトムナビ -->
    <nav class="fixed bottom-0 left-0 right-0 p-6 bg-white/60 backdrop-blur-xl border-t border-black/5 z-[6000] card-bg">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchTab('planner')" class="flex flex-col items-center gap-1 text-nordic-sage" id="btn-tab-p">
                <i data-lucide="map"></i><span class="text-[9px] font-bold uppercase tracking-widest">Walk</span>
            </button>
            <button onclick="switchTab('record')" class="flex flex-col items-center gap-1 opacity-20" id="btn-tab-r">
                <i data-lucide="archive"></i><span class="text-[9px] font-bold uppercase tracking-widest">Record</span>
            </button>
        </div>
    </nav>

    <script>
        // --- State ---
        let state = {
            weather: 'default',
            mode: 'spring',
            activeTab: 'planner',
            plannedTime: 30,
            userLocation: { lat: 34.585, lng: 135.626 }, // Default: Kashiwara
            totalDistance: parseFloat(localStorage.getItem('lumi-walk-dist') || '0'),
            isNavigating: false,
            suggestedRoute: [],
            currentStepIndex: 0,
            map: null,
            routeLine: null,
            poiMarkers: [],
            heading: 0,
            snowStartTime: null,
            isGeoFound: false,
            snowmanStage: 0
        };

        // --- Nordic Geometric SVGs ---
        const ART = {
            sunny: `
                <svg viewBox="0 0 100 100" class="nordic-art">
                    <circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 4"/>
                    <circle cx="50" cy="50" r="8" fill="currentColor" opacity="0.2"/>
                    <path d="M50 10V25M50 75V90M10 50H25M75 50H90" stroke="currentColor" stroke-width="1.5"/>
                </svg>`,
            rain: `
                <svg viewBox="0 0 100 100" class="nordic-art">
                    <circle cx="40" cy="70" r="15" fill="#81ECEC" opacity="0.6"/>
                    <circle cx="55" cy="75" r="12" fill="#74B9FF" opacity="0.6"/>
                    <circle cx="48" cy="62" r="10" fill="#A29BFE" opacity="0.6"/>
                    <rect x="65" y="70" width="20" height="15" rx="7" fill="#55E6C1"/>
                    <circle cx="70" cy="70" r="4" fill="#55E6C1"/>
                    <circle cx="80" cy="70" r="4" fill="#55E6C1"/>
                    <circle cx="70" cy="70" r="1.5" fill="#2A2A2A"/>
                    <circle cx="80" cy="70" r="1.5" fill="#2A2A2A"/>
                </svg>`,
            snow: [
                `<svg viewBox="0 0 100 100" class="nordic-art"><circle cx="50" cy="80" r="18" fill="white" stroke="#C4D4D1" stroke-width="1"/></svg>`,
                `<svg viewBox="0 0 100 100" class="nordic-art"><circle cx="50" cy="80" r="18" fill="white" stroke="#C4D4D1" stroke-width="1"/><circle cx="50" cy="55" r="12" fill="white" stroke="#C4D4D1" stroke-width="1"/></svg>`,
                `<svg viewBox="0 0 100 100" class="nordic-art">
                    <circle cx="50" cy="80" r="18" fill="white" stroke="#C4D4D1" stroke-width="1"/>
                    <circle cx="50" cy="55" r="12" fill="white" stroke="#C4D4D1" stroke-width="1"/>
                    <circle cx="50" cy="38" r="8" fill="white" stroke="#C4D4D1" stroke-width="1"/>
                    <line x1="38" y1="55" x2="25" y2="45" stroke="#2A2A2A" stroke-width="1.5"/>
                    <line x1="62" y1="55" x2="75" y2="45" stroke="#2A2A2A" stroke-width="1.5"/>
                </svg>`
            ]
        };

        // --- Core Functions ---
        function init() {
            lucide.createIcons();
            initMap();
            setupLocation();
            setupCollapseTrigger();
            
            const timeRange = document.getElementById('time-range');
            if (timeRange) {
                timeRange.oninput = (e) => {
                    state.plannedTime = parseInt(e.target.value);
                    const display = document.getElementById('time-display');
                    if (display) display.innerText = `${state.plannedTime} min`;
                    calculateRoute();
                };
            }

            // 5秒タイムアウト設定
            setTimeout(() => {
                if (!state.isGeoFound) {
                    const btn = document.getElementById('fallback-btn');
                    if (btn) {
                        btn.classList.remove('hidden');
                        btn.onclick = () => hideOverlay();
                    }
                }
            }, 5000);

            setWeather('default');
            updateUI();
        }

        function initMap() {
            state.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([state.userLocation.lat, state.userLocation.lng], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(state.map);
        }

        function setupLocation() {
            navigator.geolocation.watchPosition(pos => {
                const current = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                
                if (!state.isGeoFound) {
                    state.isGeoFound = true;
                    state.userLocation = current;
                    hideOverlay();
                    state.map.setView([current.lat, current.lng], 16);
                    fetchPOIs();
                }

                if (state.isNavigating) {
                    const d = getDistance(state.userLocation.lat, state.userLocation.lng, current.lat, current.lng);
                    if (d > 0.005) {
                        state.totalDistance += d;
                        localStorage.setItem('lumi-walk-dist', state.totalDistance.toFixed(3));
                        updateUI();
                    }
                }
                state.userLocation = current;
                updateNavigation();
            }, err => {
                console.warn("Geolocation error", err);
            }, { enableHighAccuracy: true });

            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    state.heading = e.webkitCompassHeading || (e.alpha ? 360 - e.alpha : 0);
                    if (state.isNavigating) {
                        const mapEl = document.getElementById('map');
                        if (mapEl) mapEl.style.transform = `rotate(${-state.heading}deg)`;
                    }
                });
            }
        }

        function hideOverlay() {
            const overlay = document.getElementById('geo-overlay');
            if (overlay) overlay.classList.add('hidden');
            fetchPOIs();
        }

        async function fetchPOIs() {
            const { lat, lng } = state.userLocation;
            const query = `[out:json];(node["amenity"~"cafe|place_of_worship"](around:1500,${lat},${lng});node["leisure"="park"](around:1500,${lat},${lng}););out;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                state.pois = data.elements.map(el => ({
                    id: el.id, name: el.tags.name || "Nordic Spot", lat: el.lat, lng: el.lon,
                    dist: getDistance(lat, lng, el.lat, el.lon)
                })).sort((a, b) => a.dist - b.dist);
                calculateRoute();
            } catch (e) { console.error(e); }
        }

        function calculateRoute() {
            if (!state.pois || state.pois.length < 2) return;
            const count = Math.min(Math.floor(state.plannedTime / 25) + 1, 4);
            state.suggestedRoute = state.pois.slice(0, count).concat([{...state.userLocation, name: "Home", isGoal: true}]);
            
            state.poiMarkers.forEach(m => state.map.removeLayer(m));
            state.poiMarkers = state.suggestedRoute.map(p => {
                return L.circleMarker([p.lat, p.lng], { 
                    radius: 8, 
                    fillColor: 'var(--nordic-sage)', 
                    color: '#fff', 
                    weight: 3, 
                    fillOpacity: 0.8 
                }).addTo(state.map);
            });
        }

        function setWeather(type) {
            state.weather = type;
            const layer = document.getElementById('weather-layer');
            const body = document.body;
            if (!layer || !body) return;

            layer.innerHTML = '';
            layer.classList.remove('active');
            body.classList.remove('rain-mode', 'snow-mode');

            if (type === 'rain') {
                body.classList.add('rain-mode');
                layer.classList.add('active');
                for(let i=0; i<60; i++) {
                    const d = document.createElement('div');
                    d.className = 'rain-line';
                    d.style.left = Math.random() * 100 + 'vw';
                    d.style.animationDelay = Math.random() * 2 + 's';
                    layer.appendChild(d);
                }
            } else if (type === 'snow') {
                body.classList.add('snow-mode');
                layer.classList.add('active');
                state.snowStartTime = Date.now();
                for(let i=0; i<40; i++) {
                    const f = document.createElement('div');
                    f.className = 'snow-circle';
                    f.style.left = Math.random() * 100 + 'vw';
                    const size = (Math.random() * 6 + 2) + 'px';
                    f.style.width = f.style.height = size;
                    f.style.animationDuration = (Math.random() * 5 + 5) + 's';
                    layer.appendChild(f);
                }
            }
            updateArtwork();
        }

        function updateArtwork() {
            const container = document.getElementById('artwork-svg');
            const label = document.getElementById('artwork-label');
            if (!container || !label) return;

            if (state.weather === 'rain') {
                container.innerHTML = ART.rain;
                label.innerText = "Rainy / Geometric Hydrangea";
            } else if (state.weather === 'snow') {
                const elapsed = Date.now() - (state.snowStartTime || Date.now());
                state.snowmanStage = elapsed > 60000 ? 2 : (elapsed > 30000 ? 1 : 0);
                container.innerHTML = ART.snow[state.snowmanStage];
                label.innerText = "Snowy / Growing Snowman";
                if (state.snowmanStage < 2) setTimeout(updateArtwork, 10000);
            } else {
                container.innerHTML = ART.sunny;
                label.innerText = "Sunny / Nordic Breeze";
            }
        }

        async function startFullRoute() {
            if (!state.suggestedRoute.length) return;
            state.isNavigating = true;
            state.currentStepIndex = 0;
            const card = document.getElementById('nav-step-card');
            if (card) card.style.transform = "translateY(0)";
            await fetchNextLeg();
            speak("散歩を開始します。最初のスポットへ向かいましょう。");
        }

        async function fetchNextLeg() {
            const start = state.currentStepIndex === 0 ? state.userLocation : state.suggestedRoute[state.currentStepIndex - 1];
            const end = state.suggestedRoute[state.currentStepIndex];
            const url = `https://router.project-osrm.org/route/v1/walking/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson&steps=true`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (state.routeLine) state.map.removeLayer(state.routeLine);
                state.routeLine = L.geoJSON(data.routes[0].geometry, { 
                    style: { color: 'var(--nordic-sage)', weight: 8, opacity: 0.4 } 
                }).addTo(state.map);
                state.currentRouteSteps = data.routes[0].legs[0].steps;
            } catch (e) { console.error(e); }
        }

        function updateNavigation() {
            if (!state.isNavigating || !state.currentRouteSteps || !state.currentRouteSteps.length) return;
            
            const next = state.currentRouteSteps[0];
            const target = { lat: next.maneuver.location[1], lng: next.maneuver.location[0] };
            const dist = Math.round(getDistance(state.userLocation.lat, state.userLocation.lng, target.lat, target.lng) * 1000);
            
            const distEl = document.getElementById('nav-dist');
            const instEl = document.getElementById('nav-instruction');
            if (distEl) distEl.innerText = dist;
            if (instEl) instEl.innerText = next.name || "道なりに進みます";

            if (dist < 15) {
                state.currentRouteSteps.shift();
                if (state.currentRouteSteps.length === 0) handleArrive();
            }
        }

        function handleArrive() {
            const poi = state.suggestedRoute[state.currentStepIndex];
            speak(`${poi.name}に到着しました。`);
            if (state.currentStepIndex < state.suggestedRoute.length - 1) {
                state.currentStepIndex++;
                fetchNextLeg();
            } else {
                speak("散歩が完了しました。お疲れ様でした。");
                stopNavigation();
            }
        }

        function stopNavigation() {
            state.isNavigating = false;
            const card = document.getElementById('nav-step-card');
            if (card) card.style.transform = "translateY(-150%)";
            if (state.routeLine) state.map.removeLayer(state.routeLine);
        }

        function updateUI() {
            const distEl = document.getElementById('total-dist');
            const gaugeEl = document.getElementById('cat-gauge');
            const statusEl = document.getElementById('cat-status');
            const heartEl = document.getElementById('cat-heart');

            if (distEl) distEl.innerText = state.totalDistance.toFixed(1);
            if (gaugeEl) gaugeEl.style.width = `${Math.min(state.totalDistance * 10, 100)}%`;
            
            if (statusEl) {
                if (state.totalDistance > 10) statusEl.innerText = "Nordic Friend";
                else if (state.totalDistance > 3) statusEl.innerText = "Curious Cat";
                else statusEl.innerText = "Shadow Companion";
            }
            if (heartEl) heartEl.classList.toggle('hidden', state.totalDistance < 3);
        }

        function switchTab(tab) {
            state.activeTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`tab-${tab}`);
            if (target) target.classList.add('active');
            
            const btnP = document.getElementById('btn-tab-p');
            const btnR = document.getElementById('btn-tab-r');
            if (btnP) btnP.classList.toggle('opacity-20', tab !== 'planner');
            if (btnR) btnR.classList.toggle('opacity-20', tab !== 'record');
        }

        function setupCollapseTrigger() {
            const btn = document.getElementById('skull-btn');
            if (!btn) return;
            let timer;
            btn.onmousedown = btn.ontouchstart = () => {
                timer = setTimeout(() => {
                    state.mode = (state.mode === 'collapse') ? 'spring' : 'collapse';
                    document.body.classList.toggle('collapse-mode', state.mode === 'collapse');
                    document.getElementById('header-icon').classList.toggle('glitch', state.mode === 'collapse');
                    speak(state.mode === 'collapse' ? "システムが崩壊しました" : "システムが復旧しました");
                }, 2000);
            };
            btn.onmouseup = btn.ontouchend = () => clearTimeout(timer);
        }

        function speak(t) {
            if (!window.speechSynthesis) return;
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ja-JP';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(u);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        window.onload = init;
    </script>
</body>
</html>
